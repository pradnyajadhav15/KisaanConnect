name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: KisaanConnect/backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check syntax and imports
        run: |
          python -m py_compile main.py database.py upload.py payment.py notifications.py
          python -m py_compile admin/admin_api.py auth/auth_api.py auth/db_setup.py
          python -m py_compile farmer/dashboard_api.py consumer/dashboard_api.py
          python -m py_compile ai/crop_health_api.py ai/assistant_api.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: KisaanConnect/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: KisaanConnect/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
