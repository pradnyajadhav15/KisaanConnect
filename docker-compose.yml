services:
  backend:
    build:
      context: ./KisaanConnect/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./KisaanConnect/backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./KisaanConnect/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
